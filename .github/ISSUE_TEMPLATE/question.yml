name: Question
description: Ask a question about using or configuring Supacode.
title: "[Question]: "
labels:
  - question
body:
  - type: markdown
    attributes:
      value: |
        Have a question about using Supacode? Ask away.

        If you have found a bug or want to propose a feature, please use the **Bug report** or **Feature request** form instead. For anything security related, use the private advisory link. Questions are not a place to open a pull request.
  - type: textarea
    id: question
    attributes:
      label: What would you like to know?
      description: Describe what you are trying to do and where you are stuck.
      placeholder: How do I ...?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: What have you tried?
      description: Any steps, settings, or documentation you have already looked at. This helps avoid suggesting things you have ruled out.
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Supacode version and build
      description: "Optional. From the menu bar: Supacode → About Supacode (e.g. 0.10.5 (1234))."
      placeholder: 0.10.5 (1234)
    validations:
      required: false
  - type: input
    id: macos
    attributes:
      label: macOS version
      description: "Optional.  → About This Mac (e.g. macOS 26.4)."
      placeholder: macOS 26.4
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and the README, and did not find an answer.
          required: true
        - label: I agree to follow this project's [Code of Conduct](https://github.com/supabitapp/supacode/blob/main/CODE_OF_CONDUCT.md).
          required: true
